<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Catálogo — Ale-Natura</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    @font-face { font-family: 'Corbel'; src: local('Corbel'); }
    @font-face { font-family: 'Calibri'; src: local('Calibri'); }
    .cosmetics-brand { display: flex; flex-direction: column; line-height: 1; }
    .cosmetics-brand .brand-cosmetics {
      font-family: 'Corbel', 'Montserrat', sans-serif;
      font-style: italic;
      font-weight: 400;
      font-size: 1em;
      letter-spacing: 0.02em;
    }
    .cosmetics-brand .brand-phn {
      font-family: 'Calibri', 'Montserrat', sans-serif;
      font-style: italic;
      font-weight: 700;
      font-size: 0.7em;
      letter-spacing: 0.08em;
      margin-top: 2px;
    }
  </style>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Montserrat', sans-serif;
      background: #fff;
      color: #1a1a1a;
      min-height: 100vh;
    }

    /* ── Navbar ─────────────────────────────────────────────── */
    #phn-nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 300;
      background: transparent; border-bottom: none;
      box-shadow: none;
    }
    .phn-nav-inner {
      max-width: 1300px; margin: 0 auto; padding: 0 20px;
      height: 64px; display: flex; align-items: center; gap: 12px;
    }
    .phn-nav-logo { flex-shrink: 0; display: flex; align-items: center; margin-right: auto; }
    .phn-nav-logo img { height: 42px; width: auto; object-fit: contain; filter: brightness(0) invert(1); }
    .phn-nav-links { display: flex; align-items: center; gap: 2px; }
    .phn-nav-links a {
      padding: 8px 13px; font-size: 1.05em; font-weight: 600;
      color: #fff; text-decoration: none; border-radius: 6px;
      white-space: nowrap; transition: background .2s;
      text-shadow: 0 1px 4px rgba(0,0,0,.4);
    }
    .phn-nav-links a:hover { background: rgba(255,255,255,.15); }
    .phn-nav-links a.active { color: #fff; background: rgba(255,255,255,.2); }
    @media (max-width: 768px) {
      .phn-nav-links { display: none; }
    }

    /* ── Grid de banners ───────────────────────────────────── */
    .cat-grid {
      max-width: 100%;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .cat-card {
      position: relative;
      overflow: hidden;
      min-height: 100vh;
      min-height: 100svh;
      display: flex;
      align-items: flex-end;
      text-decoration: none;
      color: #fff;
    }

    .cat-card-bg {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center;
      transition: transform .4s;
    }
    .cat-card:hover .cat-card-bg { transform: scale(1.03); }

    .cat-card-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,.75) 0%, rgba(0,0,0,.40) 45%, rgba(0,0,0,.15) 100%);
      z-index: 1;
    }

    .cat-card-content {
      position: relative; z-index: 2;
      padding: 48px 56px;
      width: 100%;
      max-width: 600px;
    }
    .cat-card-title {
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 900;
      margin-bottom: 10px;
      text-shadow: 0 2px 12px rgba(0,0,0,.4);
      line-height: 1.15;
    }
    .cat-card-desc {
      font-size: clamp(1rem, 2vw, 1.3rem);
      opacity: .92;
      text-shadow: 0 1px 6px rgba(0,0,0,.4);
    }
    .cat-card-arrow {
      position: absolute; top: 28px; right: 28px;
      z-index: 2;
      background: rgba(255,255,255,.2);
      backdrop-filter: blur(8px);
      border-radius: 50%;
      width: 48px; height: 48px;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s;
    }
    .cat-card:hover .cat-card-arrow { background: #70B62F; }

    /* ── Placeholder para banners sin imagen ── */
    .cat-card--productos { background: linear-gradient(135deg, #70B62F, #4a8c1a); }
    .cat-card--cosmeticos { background: linear-gradient(135deg, #d4a373, #a0785a); }

    @media (max-width: 768px) {
      .cat-card-content { padding: 28px 24px; }
    }

    /* ── Botón volver (dentro del navbar) ── */
    .cat-back-link {
      font-size: .78rem; font-weight: 600; color: #fff;
      text-decoration: none; display: flex; align-items: center; gap: 4px;
      text-shadow: 0 1px 4px rgba(0,0,0,.4);
    }
    .cat-back-link:hover { opacity: .8; }
  </style>
</head>
<body>

<header id="phn-nav">
  <div class="phn-nav-inner">
    <a href="index.html" class="phn-nav-logo">
      <img src="public/images/logos/Logo PHN.webp" alt="PHN — Proher Natura"
           onerror="this.src='public/images/logos/Logo PHN.png';" />
    </a>
    <a href="index.html" class="cat-back-link">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      Volver al inicio
    </a>
  </div>
</header>

<div class="cat-grid">

  <!-- Banner Productos -->
  <a href="productos.html" class="cat-card cat-card--productos">
    <img class="cat-card-bg" src="public/images/banners/banner-productos.webp" alt="Productos" />
    <div class="cat-card-overlay"></div>
    <div class="cat-card-arrow">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
    </div>
    <div class="cat-card-content">
      <div class="cat-card-title cosmetics-brand"><span class="brand-cosmetics">Productos</span><span class="brand-phn">PHN</span></div>
      <div class="cat-card-desc">Suplementos naturales y fórmulas vitales</div>
    </div>
  </a>

  <!-- Banner Cosméticos -->
  <a href="cosmeticos.html" class="cat-card cat-card--cosmeticos">
    <img class="cat-card-bg" src="public/images/banners/banner-cosmeticos.webp" alt="Cosméticos" />
    <div class="cat-card-overlay"></div>
    <div class="cat-card-arrow">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
    </div>
    <div class="cat-card-content">
      <div class="cat-card-title cosmetics-brand"><span class="brand-cosmetics">Cosmetics</span><span class="brand-phn">PHN</span></div>
      <div class="cat-card-desc">Cremas, geles y cuidado de la piel</div>
    </div>
  </a>

</div>


<script src="compra/js/footer.js" data-root=""></script>

<script src="src/features/meredith-widget.js" data-root="" defer></script>
</body>
</html>
