<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carrito — Ale-Natura</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Montserrat', sans-serif;
      background: #f7f9f5;
      color: #1a1a1a;
      min-height: 100vh;
      transition: background .3s, color .3s;
    }

    /* ── Navbar ── */
    #phn-nav {
      position: sticky; top: 0; z-index: 200;
      background: #fff;
      border-bottom: 1px solid #e5e5e5;
      box-shadow: 0 2px 8px rgba(0,0,0,.06);
    }
    #phn-nav .inner {
      max-width: 1100px; margin: 0 auto;
      padding: 0 24px; height: 64px;
      display: flex; align-items: center; gap: 16px;
    }
    #phn-nav a.logo { flex-shrink: 0; display: flex; align-items: center; }
    #phn-nav .logo img { height: 42px; width: auto; object-fit: contain; }
    #phn-nav .back {
      margin-left: auto;
      display: flex; align-items: center; gap: 6px;
      font-size: 1.05em; font-weight: 600;
      color: #2e7d32; text-decoration: none;
    }
    #phn-nav .back:hover { text-decoration: underline; }

    /* ── Contenido ── */
    .page-wrap {
      max-width: 760px; margin: 0 auto;
      padding: 40px 20px 80px;
    }

    h1 {
      font-size: 1.9rem; font-weight: 800;
      letter-spacing: -.02em; margin-bottom: 6px;
    }
    .subtitle { font-size: .9rem; color: #666; margin-bottom: 32px; }

    /* ── Carrito vacío ── */
    #empty-state {
      text-align: center; padding: 64px 20px;
    }
    #empty-state svg { opacity: .25; margin-bottom: 20px; }
    #empty-state p { font-size: 1.1rem; color: #888; margin-bottom: 24px; }
    #empty-state a {
      display: inline-flex; align-items: center; gap: 8px;
      background: #2e7d32; color: #fff;
      padding: 12px 28px; border-radius: 8px;
      font-weight: 700; text-decoration: none;
      transition: background .2s;
    }
    #empty-state a:hover { background: #1b5e20; }

    /* ── Lista de productos ── */
    #cart-list { display: flex; flex-direction: column; gap: 14px; }

    .cart-item {
      display: flex; align-items: center; gap: 16px;
      background: #fff; border: 1px solid #e8e8e8;
      border-radius: 12px; padding: 16px 20px;
      transition: box-shadow .2s;
    }
    .cart-item:hover { box-shadow: 0 4px 16px rgba(0,0,0,.08); }

    .item-icon {
      width: 64px; height: 64px; border-radius: 8px;
      background: #edf7e0;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; font-size: 1.3rem;
    }
    .item-thumb {
      width: 64px; height: 64px; border-radius: 8px;
      object-fit: contain; flex-shrink: 0;
      background: #f5f7f2;
      border: 1px solid #e8e8e8;
      padding: 4px;
    }

    .item-thumb { cursor: pointer; }

    .item-info {
      flex: 1;
      display: flex; flex-direction: column; gap: 2px;
    }
    .item-name {
      font-weight: 700; font-size: .97rem;
    }
    .item-price {
      font-size: .82rem; color: #2e7d32; font-weight: 600;
    }
    .item-subtotal {
      font-size: .78rem; color: #888;
    }

    .item-qty {
      display: flex; align-items: center; gap: 8px;
    }
    .qty-btn {
      width: 30px; height: 30px; border-radius: 50%;
      border: 1.5px solid #ddd;
      background: #f7f7f7; cursor: pointer;
      font-size: 1.1rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s;
      font-family: 'Montserrat', sans-serif;
    }
    .qty-btn:hover { background: #e8f5e9; border-color: #2e7d32; }
    .qty-num {
      min-width: 28px; text-align: center;
      font-weight: 700; font-size: .95rem;
    }

    .remove-btn {
      background: none; border: none; cursor: pointer;
      color: #ccc; font-size: 1.2rem;
      padding: 4px; border-radius: 4px;
      transition: color .15s;
    }
    .remove-btn:hover { color: #e53935; }

    /* ── Resumen ── */
    #cart-summary {
      margin-top: 32px;
      background: #fff; border: 1px solid #e8e8e8;
      border-radius: 14px; padding: 24px 28px;
    }
    #cart-summary h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 16px; }
    #summary-list { font-size: .88rem; color: #555; line-height: 2; margin-bottom: 12px; }
    #summary-list span { color: #1a1a1a; font-weight: 600; }
    .summary-price { float: right; font-weight: 600; color: #1a1a1a; }

    #cart-total {
      font-size: 1.15rem; font-weight: 800;
      display: flex; justify-content: space-between;
      padding: 14px 0 18px; border-top: 2px solid #e8e8e8;
      margin-bottom: 18px;
    }
    #cart-total .total-amount { color: #2e7d32; }

    /* ── Lightbox imagen ── */
    #phn-img-lb {
      display: none; position: fixed; inset: 0; z-index: 9999;
      background: rgba(0,0,0,.85);
      align-items: center; justify-content: center;
      cursor: zoom-out;
    }
    #phn-img-lb.active { display: flex; }
    #phn-img-lb img {
      max-width: 90vw; max-height: 85vh;
      object-fit: contain; border-radius: 12px;
      box-shadow: 0 8px 40px rgba(0,0,0,.5);
    }
    #phn-img-lb-close {
      position: absolute; top: 18px; right: 22px;
      background: none; border: none; color: #fff;
      font-size: 2.2rem; cursor: pointer; line-height: 1;
    }

    /* ── Mensaje WhatsApp preview ── */
    #wa-preview {
      background: #e7f5e8; border-radius: 10px;
      padding: 14px 18px; font-size: .82rem;
      color: #2d4a1e; white-space: pre-wrap;
      font-family: 'Montserrat', monospace;
      border: 1px solid #c3e6c5;
      margin-bottom: 20px;
      max-height: 180px; overflow-y: auto;
    }

    #send-wa-btn {
      width: 100%; padding: 16px;
      background: #25d366; color: #fff;
      border: none; border-radius: 10px;
      font-size: 1rem; font-weight: 700;
      cursor: pointer; display: flex; align-items: center;
      justify-content: center; gap: 10px;
      font-family: 'Montserrat', sans-serif;
      transition: background .2s;
    }
    #send-wa-btn:hover { background: #128c7e; }

    .clear-btn {
      display: block; margin-top: 14px;
      background: none; border: none; cursor: pointer;
      color: #aaa; font-size: .8rem;
      font-family: 'Montserrat', sans-serif;
      text-align: center; width: 100%;
      transition: color .15s;
    }
    .clear-btn:hover { color: #e53935; }

    /* ── Modo oscuro ── */
    html.dark body           { background: #121212; color: #e0e0e0; }
    html.dark #phn-nav       { background: #1c1c1c; border-color: #333; }
    html.dark #phn-nav a     { color: #e0e0e0; }
    html.dark #phn-nav .back { color: #7dcf47; }
    html.dark .cart-item,
    html.dark #cart-summary  { background: #1e1e1e; border-color: #333; }
    html.dark .item-icon     { background: #1e2e12; }
    html.dark .item-thumb    { border-color: #333; }
    html.dark .qty-btn       { background: #2a2a2a; border-color: #444; color: #e0e0e0; }
    html.dark .qty-btn:hover { background: #1e2e12; border-color: #4caf50; }
    html.dark #wa-preview    { background: #1a2a1a; border-color: #2e4a2e; color: #b8e0bc; }
    html.dark .subtitle,
    html.dark #summary-list  { color: #aaa; }
    html.dark #summary-list span { color: #e0e0e0; }
    html.dark .remove-btn    { color: #555; }
    html.dark #phn-theme-btn { background: #2a2a2a; color: #e0e0e0; border-color: #555; }
    html.dark #phn-lang-btn  { color: #e0e0e0; border-color: rgba(255,255,255,.3); }
    html.dark .item-price    { color: #7dcf47; }
    html.dark .item-subtotal { color: #777; }
    html.dark #cart-total    { border-color: #444; }
    html.dark #cart-total .total-amount { color: #7dcf47; }
    html.dark .summary-price { color: #e0e0e0; }
  </style>
</head>
<body>

<!-- ── Navbar ── -->
<nav id="phn-nav">
  <div class="inner">
    <a href="index.html" class="logo">
      <img src="public/images/logos/Logo PHN.webp" alt="PHN"
           onerror="this.style.display='none';" />
    </a>

    <!-- Botones tema + idioma -->
    <button id="phn-theme-btn" title="Cambiar tema"
      style="margin-left:auto;display:flex;align-items:center;justify-content:center;width:38px;height:38px;border-radius:50%;border:1.5px solid #ddd;background:#f7f7f7;color:#333;cursor:pointer;transition:background .2s;">
      <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>

    <button id="phn-lang-btn" data-lang="es"
      style="display:flex;align-items:center;justify-content:center;height:34px;padding:0 12px;border-radius:999px;border:1.5px solid rgba(0,0,0,.25);background:transparent;cursor:pointer;font-family:'Montserrat',sans-serif;font-size:.78rem;font-weight:700;color:#1a1a1a;letter-spacing:.06em;">
      EN
    </button>

    <a href="productos.html" class="back">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24"
           stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      Seguir comprando
    </a>
  </div>
</nav>

<!-- ── Página principal ── -->
<div class="page-wrap">
  <h1>🛒 Mi carrito</h1>
  <p class="subtitle" id="cart-count-label">Calculando…</p>

  <!-- Estado vacío -->
  <div id="empty-state" style="display:none;">
    <svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" fill="none"
         viewBox="0 0 576 512"><path fill="#888" d="M24 0C10.7 0 0 10.7 0 24S10.7 48 24 48l45.5 0c3.8 0 7.1 2.7 7.9 6.5l51.6 271c6.5 34 36.2 58.5 70.7 58.5L488 384c13.3 0 24-10.7 24-24s-10.7-24-24-24l-288.3 0c-11.5 0-21.4-8.2-23.6-19.5L170.7 288l288.5 0c32.6 0 61.1-21.8 69.5-53.3l41-152.3C576.6 57 557.4 32 531.1 32l-411 0C111 12.8 91.6 0 69.5 0L24 0zM176 512a48 48 0 1 0 0-96 48 48 0 1 0 0 96zm336-48a48 48 0 1 0 -96 0 48 48 0 1 0 96 0z"/></svg>
    <p>Tu carrito está vacío</p>
    <a href="productos.html">← Ver productos</a>
  </div>

  <!-- Lista de items -->
  <div id="cart-list"></div>

  <!-- Resumen y enviar -->
  <div id="cart-summary" style="display:none;">
    <h2>Resumen del pedido</h2>
    <div id="summary-list"></div>
    <div id="cart-total"><span>Total estimado</span><span class="total-amount" id="total-amount">$0</span></div>
    <div id="wa-preview"></div>
    <button id="send-wa-btn" onclick="phnSendWA()">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
      </svg>
      Enviar pedido por WhatsApp
    </button>
    <button class="clear-btn" onclick="phnClearCart()">🗑 Vaciar carrito</button>
  </div>
</div>

<!-- Lightbox para ver imagen en grande -->
<div id="phn-img-lb" onclick="phnCloseLb()">
  <button id="phn-img-lb-close" onclick="phnCloseLb()">&times;</button>
  <img id="phn-img-lb-img" src="" alt="Producto">
</div>

<script>
function phnOpenLb(src) {
  var lb = document.getElementById('phn-img-lb');
  document.getElementById('phn-img-lb-img').src = src;
  lb.classList.add('active');
}
function phnCloseLb() {
  document.getElementById('phn-img-lb').classList.remove('active');
}
document.addEventListener('keydown', function(e){ if(e.key==='Escape') phnCloseLb(); });

const WA_NUMBER = '525536194099';

function getCart() {
  try { return JSON.parse(localStorage.getItem('phn-cart') || '[]'); } catch(e) { return []; }
}
function saveCart(cart) {
  localStorage.setItem('phn-cart', JSON.stringify(cart));
  renderCart();
}

function parsePrice(str) {
  if (!str) return 0;
  return parseInt(str.replace(/[^0-9]/g, ''), 10) || 0;
}
function formatPrice(num) {
  return '$' + num.toLocaleString('es-MX');
}

function buildWAMessage(cart) {
  var lines = ['Hola 👋, me gustaría hacer el siguiente pedido de *PHN Proher Natura*:\n'];
  var grandTotal = 0;
  cart.forEach(function(item) {
    var line = '• ' + item.name + ' × ' + item.qty;
    if (item.price) {
      var sub = parsePrice(item.price) * item.qty;
      grandTotal += sub;
      line += '  (' + item.price + ' c/u → ' + formatPrice(sub) + ')';
    }
    lines.push(line);
  });
  var totalQty = cart.reduce(function(s, i){ return s + i.qty; }, 0);
  lines.push('\nTotal: ' + totalQty + ' producto' + (totalQty !== 1 ? 's' : ''));
  if (grandTotal > 0) {
    lines.push('Monto estimado: ' + formatPrice(grandTotal));
  }
  lines.push('Por favor, ¿me pueden confirmar disponibilidad? 🙏');
  return lines.join('\n');
}

function renderCart() {
  var cart = getCart();
  var listEl  = document.getElementById('cart-list');
  var emptyEl = document.getElementById('empty-state');
  var summaryEl = document.getElementById('cart-summary');
  var countLabel = document.getElementById('cart-count-label');
  var summaryList = document.getElementById('summary-list');
  var waPreview = document.getElementById('wa-preview');

  listEl.innerHTML = '';

  if (cart.length === 0) {
    emptyEl.style.display = 'block';
    summaryEl.style.display = 'none';
    countLabel.textContent = 'Tu carrito está vacío';
    return;
  }

  emptyEl.style.display = 'none';
  summaryEl.style.display = 'block';

  var total = cart.reduce(function(s, i){ return s + i.qty; }, 0);
  countLabel.textContent = total + ' producto' + (total !== 1 ? 's' : '') + ' en tu carrito';

  // Render items
  var grandTotal = 0;
  cart.forEach(function(item, idx) {
    var div = document.createElement('div');
    div.className = 'cart-item';
    var unitPrice = parsePrice(item.price);
    var subtotal = unitPrice * item.qty;
    grandTotal += subtotal;

    var thumbHtml = item.img
      ? '<img class="item-thumb" src="' + item.img + '" alt="' + item.name + '" onclick="phnOpenLb(\'' + item.img.replace(/'/g, "\\'") + '\')" onerror="this.onerror=null;this.style.display=\'none\';this.parentNode.insertBefore(Object.assign(document.createElement(\'div\'),{className:\'item-icon\',textContent:\'🌿\'}),this);">'
      : '<div class="item-icon">🌿</div>';

    var priceHtml = item.price
      ? '<div class="item-price">' + item.price + ' c/u</div>' +
        (item.qty > 1 ? '<div class="item-subtotal">Subtotal: ' + formatPrice(subtotal) + '</div>' : '')
      : '';

    div.innerHTML =
      thumbHtml +
      '<div class="item-info">' +
        '<div class="item-name">' + item.name + '</div>' +
        priceHtml +
      '</div>' +
      '<div class="item-qty">' +
        '<button class="qty-btn" onclick="phnChangeQty(' + idx + ', -1)">−</button>' +
        '<span class="qty-num">' + item.qty + '</span>' +
        '<button class="qty-btn" onclick="phnChangeQty(' + idx + ', 1)">+</button>' +
      '</div>' +
      '<button class="remove-btn" onclick="phnRemove(' + idx + ')" title="Eliminar">✕</button>';
    listEl.appendChild(div);
  });

  // Total
  var totalEl = document.getElementById('total-amount');
  if (totalEl) totalEl.textContent = grandTotal > 0 ? formatPrice(grandTotal) : 'Pendiente';

  // Summary
  summaryList.innerHTML = cart.map(function(i){
    var priceTxt = i.price ? '<span class="summary-price">' + formatPrice(parsePrice(i.price) * i.qty) + '</span>' : '';
    return '<span>' + i.name + '</span> × ' + i.qty + priceTxt + '<br>';
  }).join('');

  // WA preview
  waPreview.textContent = buildWAMessage(cart);
}

function phnChangeQty(idx, delta) {
  var cart = getCart();
  cart[idx].qty = Math.max(1, (cart[idx].qty || 1) + delta);
  saveCart(cart);
}

function phnRemove(idx) {
  var cart = getCart();
  cart.splice(idx, 1);
  saveCart(cart);
}

function phnClearCart() {
  if (confirm('¿Vaciar el carrito?')) { saveCart([]); }
}

function phnSendWA() {
  var cart = getCart();
  if (cart.length === 0) return;
  var msg = buildWAMessage(cart);
  var url = 'https://wa.me/' + WA_NUMBER + '?text=' + encodeURIComponent(msg);
  window.open(url, '_blank', 'noopener');
}

// Tema oscuro/claro
(function(){
  var saved = localStorage.getItem('phn-theme');
  var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  if (saved ? saved === 'dark' : prefersDark) document.documentElement.classList.add('dark');

  var sunIcon = '<svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>';
  var moonIcon = '<svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';

  document.addEventListener('DOMContentLoaded', function(){
    var btn = document.getElementById('phn-theme-btn');
    if (btn) {
      btn.innerHTML = document.documentElement.classList.contains('dark') ? sunIcon : moonIcon;
      btn.addEventListener('click', function(){
        var dark = document.documentElement.classList.toggle('dark');
        localStorage.setItem('phn-theme', dark ? 'dark' : 'light');
        btn.innerHTML = dark ? sunIcon : moonIcon;
      });
    }
    var langBtn = document.getElementById('phn-lang-btn');
    if (langBtn) {
      var lang = localStorage.getItem('phn-lang') || 'es';
      langBtn.dataset.lang = lang;
      langBtn.textContent = lang === 'es' ? 'EN' : 'ES';
      langBtn.addEventListener('click', function(){
        var next = langBtn.dataset.lang === 'es' ? 'en' : 'es';
        langBtn.dataset.lang = next;
        langBtn.textContent = next === 'es' ? 'EN' : 'ES';
        localStorage.setItem('phn-lang', next);
      });
    }
    renderCart();
  });
})();
</script>
<script src="compra/js/footer.js" data-root=""></script>
<script src="src/features/meredith-widget.js" data-root="" defer></script>
</body>
</html>
