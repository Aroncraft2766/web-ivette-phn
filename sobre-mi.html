  <title>PHN Cosmetics</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --negro:         #000000;
      --blanco:        #ffffff;
      --gris-fondo:    #f5f5f5;
      --gris-texto:    #555555;
      --gris-borde:    #dddddd;
      --fuente-titulo: 'Cormorant Garamond', Georgia, serif;
      --fuente-texto:  'Montserrat', Arial, sans-serif;
      --fuente-marca:  'Corbel', 'Segoe UI', Calibri, Arial, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--fuente-texto); color: var(--negro); background: var(--blanco); font-weight: 300; }
    img  { display: block; width: 100%; height: 100%; object-fit: cover; }
    a    { color: inherit; text-decoration: none; }
    hr.sep { border: none; border-top: 1px solid var(--gris-borde); margin: 0; }

    /* ── NAV ── */
    .nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: var(--negro); height: 56px;
      display: flex; align-items: center; justify-content: center;
      padding: 0 16px;
    }
    .nav__logo {
      font-family: var(--fuente-marca);
      font-size: 20px; font-weight: 600;
      letter-spacing: 0.18em; color: var(--blanco); text-transform: uppercase;
    }
    .nav__carrito {
      position: absolute; right: 16px;
      background: none; border: none; cursor: pointer;
      color: var(--blanco); display: flex; align-items: center; gap: 6px;
      padding: 8px; line-height: 1;
    }
    .nav__carrito svg { width: 22px; height: 22px; fill: none; stroke: currentColor; stroke-width: 1.5; }
    .nav__carrito-count {
      background: var(--blanco); color: var(--negro);
      font-family: var(--fuente-texto); font-size: 10px; font-weight: 500;
      border-radius: 50%; min-width: 18px; height: 18px;
      display: flex; align-items: center; justify-content: center;
      padding: 0 4px;
    }
    .nav__carrito-count[hidden] { display: none; }

    /* ── HERO ── */
    .hero {
      position: relative; width: 100%; height: 100vh; min-height: 500px;
      margin-top: 56px; overflow: hidden;
    }
    .hero__img { position: absolute; inset: 0; }
    .hero__degradado {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, transparent 40%, rgba(0,0,0,0.6) 100%);
    }
    .hero__texto {
      position: absolute; bottom: 48px; left: 0; right: 0;
      padding: 0 40px; color: var(--blanco); text-align: center;
    }
    .etiqueta { font-size: 11px; letter-spacing: 0.25em; text-transform: uppercase; margin-bottom: 12px; }
    .titulo-hero {
      font-family: var(--fuente-titulo); font-size: clamp(28px, 5vw, 52px);
      font-weight: 300; line-height: 1.15; max-width: 700px; margin: 0 auto;
    }

    /* ── DESCRIPCIÓN ── */
    .descripcion { max-width: 680px; margin: 0 auto; padding: 80px 40px; text-align: center; }
    .descripcion p {
      font-family: var(--fuente-titulo); font-size: clamp(18px, 2.5vw, 24px);
      font-weight: 300; line-height: 1.65; margin-bottom: 1em;
    }
    .descripcion p:last-child { margin-bottom: 0; }

    /* ── BANNER ── */
    .banner { position: relative; width: 100%; aspect-ratio: 16/9; overflow: hidden; background: var(--negro); }
    @media (max-width: 768px) { .banner { aspect-ratio: 3/4; } }
    .banner__img { position: absolute; inset: 0; }
    .banner__overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.2); }
    .banner__texto { position: absolute; bottom: 0; left: 0; right: 0; padding: 48px; color: var(--blanco); }
    .banner__subtitulo { font-size: 11px; letter-spacing: 0.25em; text-transform: uppercase; margin-bottom: 8px; }
    .banner__titulo {
      font-family: var(--fuente-titulo); font-size: clamp(32px, 5vw, 64px);
      font-weight: 300; line-height: 1.1;
    }

    /* ── ESTADÍSTICAS ── */
    .stats { padding: 80px 40px; }
    .stats__header { max-width: 900px; margin: 0 auto 48px; }
    .stats__titulo { font-family: var(--fuente-titulo); font-size: clamp(22px, 3.5vw, 36px); font-weight: 300; line-height: 1.3; }
    .stats__num {
      font-family: var(--fuente-titulo); font-size: clamp(36px, 5vw, 60px);
      font-weight: 300; margin: 16px 0 4px;
    }
    .stats__num em { font-size: 0.5em; font-family: var(--fuente-texto); font-style: normal; vertical-align: middle; letter-spacing: 0.1em; }
    .stats__desc { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gris-texto); margin-bottom: 40px; }
    .galeria { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; max-width: 1200px; margin: 0 auto; }
    @media (max-width: 768px) { .galeria { grid-template-columns: 1fr 1fr; } }
    .galeria__img { aspect-ratio: 2/3; overflow: hidden; }

    /* ── PRODUCTO ── */
    .producto { display: grid; grid-template-columns: 1fr 1fr; min-height: 80vh; }
    @media (max-width: 768px) { .producto { grid-template-columns: 1fr; } }
    .producto--invertido .producto__img  { order: 2; }
    .producto--invertido .producto__info { order: 1; }
    @media (max-width: 768px) {
      .producto--invertido .producto__img  { order: 1; }
      .producto--invertido .producto__info { order: 2; }
    }
    .producto__img  { position: relative; overflow: hidden; min-height: 400px; }
    .producto__info {
      display: flex; flex-direction: column; justify-content: center;
      padding: clamp(32px, 6vw, 80px) clamp(24px, 5vw, 64px);
    }
    .producto__etiqueta { font-size: 11px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--gris-texto); margin-bottom: 8px; }
    .producto__nombre   { font-family: var(--fuente-titulo); font-size: clamp(28px, 4vw, 48px); font-weight: 300; margin-bottom: 24px; }
    .producto__desc     { font-size: 14px; line-height: 1.85; color: var(--gris-texto); margin-bottom: 32px; max-width: 380px; }
    .producto__desc p   { margin-bottom: 0.5em; }
    .producto__acciones { display: flex; flex-direction: column; gap: 10px; align-items: flex-start; }

    /* ── BOTONES ── */
    .boton {
      display: inline-block; padding: 14px 36px;
      border: 1px solid var(--negro); background: var(--negro); color: var(--blanco);
      font-family: var(--fuente-texto);
      font-size: 11px; letter-spacing: 0.25em; text-transform: uppercase;
      cursor: pointer; transition: background .2s, color .2s;
    }
    .boton:hover { background: transparent; color: var(--negro); }
    .boton--ghost {
      background: transparent; color: var(--negro);
    }
    .boton--ghost:hover { background: var(--negro); color: var(--blanco); }
    .boton--agregar {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 12px 28px;
      border: 1px solid var(--negro); background: transparent; color: var(--negro);
      font-family: var(--fuente-texto);
      font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase;
      cursor: pointer; transition: background .2s, color .2s;
    }
    .boton--agregar:hover { background: var(--negro); color: var(--blanco); }
    .boton--agregar svg { width: 14px; height: 14px; fill: none; stroke: currentColor; stroke-width: 1.5; flex-shrink: 0; }

    /* ── RUTINA ── */
    .rutina { padding: 80px 40px; }
    .rutina__header { text-align: center; margin-bottom: 48px; }
    .rutina__sup { font-size: 11px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--gris-texto); margin-bottom: 8px; }
    .rutina__tit { font-family: var(--fuente-titulo); font-size: clamp(24px, 4vw, 40px); font-weight: 300; }
    .rutina__grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; max-width: 1200px; margin: 0 auto; }
    .rutina__grid--3 { grid-template-columns: repeat(3, 1fr); }
    @media (max-width: 1024px) { .rutina__grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 480px)  { .rutina__grid { grid-template-columns: 1fr 1fr; gap: 12px; } }
    .tarjeta { display: flex; flex-direction: column; }
    .tarjeta__img  { aspect-ratio: 1/1; overflow: hidden; background: var(--gris-fondo); margin-bottom: 14px; }
    .tarjeta__nom  { font-family: var(--fuente-titulo); font-size: 16px; margin-bottom: 4px; line-height: 1.3; }
    .tarjeta__prec { font-size: 13px; color: var(--gris-texto); margin-bottom: 10px; }
    .tarjeta__acciones { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .tarjeta__btn  { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; text-decoration: underline; cursor: pointer; }
    .tarjeta__carrito {
      background: none; border: none; cursor: pointer;
      color: var(--gris-texto); display: flex; align-items: center;
      padding: 2px; transition: color .2s;
    }
    .tarjeta__carrito:hover { color: var(--negro); }
    .tarjeta__carrito svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 1.5; }

    /* ── NOTAS Y FOOTER ── */
    .notas { padding: 32px 40px; border-top: 1px solid var(--gris-borde); }
    .notas p { font-size: 11px; color: var(--gris-texto); line-height: 1.9; }
    .footer { background: var(--negro); color: var(--blanco); padding: 48px 40px; text-align: center; }
    .footer__logo {
      font-family: var(--fuente-marca);
      font-size: 22px; font-weight: 600;
      letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 12px;
    }
    .footer__sub  { font-size: 11px; color: rgba(255,255,255,.5); }

    /* ── BOTÓN WHATSAPP FLOTANTE ── */
    .whatsapp-btn {
      position: fixed; bottom: 28px; right: 28px; z-index: 300;
      width: 58px; height: 58px; background: #25D366; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 16px rgba(0,0,0,0.25);
      transition: transform .2s ease, box-shadow .2s ease;
    }
    .whatsapp-btn:hover { transform: scale(1.1); box-shadow: 0 6px 22px rgba(0,0,0,0.32); }
    .whatsapp-btn svg { width: 32px; height: 32px; fill: #ffffff; }

    /* ── CARRITO PANEL ── */
    .carrito-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.45);
      z-index: 200; opacity: 0; pointer-events: none;
      transition: opacity .3s;
    }
    .carrito-overlay--visible { opacity: 1; pointer-events: auto; }

    .carrito-panel {
      position: fixed; top: 0; right: 0; bottom: 0;
      width: min(420px, 100vw);
      background: var(--blanco); z-index: 201;
      transform: translateX(100%); transition: transform .35s ease;
      display: flex; flex-direction: column; overflow: hidden;
      box-shadow: -4px 0 24px rgba(0,0,0,0.12);
    }
    .carrito-panel--open { transform: translateX(0); }

    .carrito__header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 20px 24px; border-bottom: 1px solid var(--gris-borde);
      flex-shrink: 0;
    }
    .carrito__titulo {
      font-family: var(--fuente-titulo); font-size: 22px; font-weight: 300;
      letter-spacing: 0.12em; text-transform: uppercase;
    }
    .carrito__cerrar {
      background: none; border: none; cursor: pointer;
      font-size: 22px; line-height: 1; color: var(--negro); padding: 4px;
    }

    .carrito__body { flex: 1; overflow-y: auto; padding: 0 24px; }

    .carrito__vacio {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 200px;
      color: var(--gris-texto); font-size: 12px;
      letter-spacing: 0.15em; text-transform: uppercase; gap: 12px;
    }
    .carrito__vacio svg { width: 36px; height: 36px; fill: none; stroke: var(--gris-borde); stroke-width: 1.5; }

    .carrito__item {
      display: flex; align-items: center;
      padding: 14px 0; border-bottom: 1px solid var(--gris-borde); gap: 12px;
    }
    .carrito__item-img {
      width: 64px; height: 64px; object-fit: cover;
      flex-shrink: 0; background: var(--gris-fondo);
    }
    .carrito__item-info { flex: 1; min-width: 0; }
    .carrito__item-nom {
      font-size: 13px; font-weight: 400; margin-bottom: 4px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .carrito__item-prec { font-size: 12px; color: var(--gris-texto); }
    .carrito__item-ctrl { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .carrito__qty-btn {
      background: none; border: 1px solid var(--gris-borde);
      width: 26px; height: 26px; cursor: pointer; font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      transition: border-color .2s;
    }
    .carrito__qty-btn:hover { border-color: var(--negro); }
    .carrito__qty { font-size: 13px; min-width: 20px; text-align: center; }
    .carrito__item-del {
      background: none; border: none; cursor: pointer;
      color: var(--gris-texto); font-size: 16px; padding: 0 4px;
      transition: color .2s; line-height: 1;
    }
    .carrito__item-del:hover { color: var(--negro); }

    .carrito__footer {
      padding: 20px 24px; border-top: 1px solid var(--gris-borde);
      flex-shrink: 0;
    }
    .carrito__total {
      display: flex; justify-content: space-between; align-items: baseline;
      font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase;
      margin-bottom: 16px;
    }
    .carrito__total-num {
      font-family: var(--fuente-titulo); font-size: 22px; font-weight: 300;
    }
    .carrito__pedir {
      width: 100%; padding: 16px;
      background: var(--negro); color: var(--blanco); border: none;
      font-family: var(--fuente-texto); font-size: 11px;
      letter-spacing: 0.25em; text-transform: uppercase;
      cursor: pointer; transition: background .2s;
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .carrito__pedir:hover { background: #222; }
    .carrito__pedir svg { width: 18px; height: 18px; fill: currentColor; }
  </style>
</head>

  <!-- CARRITO: DATOS Y LÓGICA -->
  <script>
  (function () {
    // Catálogo — lee precios de TEXTO (contenido.js) con fallback
    var T = (typeof TEXTO !== 'undefined') ? TEXTO : {};
    var CATALOGO = {
      1: { nombre: T.prod1_nombre || "CLGQ10 De Día",             precio: T.prod1_precio || 350, img: "public/images/rutina-brillo-3.webp" },
      2: { nombre: T.prod2_nombre || "CLGQ10 De Noche",           precio: T.prod2_precio || 350, img: "public/images/rutina-brillo-2.webp" },
      3: { nombre: T.prod3_nombre || "VR4 – Gel Tonificante",     precio: T.prod3_precio || 250, img: "public/images/rutina-mate-2.webp"   },
      4: { nombre: T.prod4_nombre || "DB6 – Crema Corporal",      precio: T.prod4_precio || 300, img: "public/images/rutina-brillo-1.webp" },
      5: { nombre: T.prod5_nombre || "F.VIT – Gel Reafirmante",   precio: T.prod5_precio || 250, img: "public/images/rutina-mate-3.webp"   },
      6: { nombre: T.prod6_nombre || "PGMT20 – Exfoliante",       precio: T.prod6_precio || 280, img: "public/images/rutina-mate-1.webp"   },
    };

    // Estado del carrito { id: cantidad }
    var estado = {};

    // Referencias DOM
    var panel   = document.getElementById('carrito-panel');
    var overlay = document.getElementById('carrito-overlay');
    var body    = document.getElementById('carrito-body');
    var vacio   = document.getElementById('carrito-vacio');
    var footer  = document.getElementById('carrito-footer');
    var totalEl = document.getElementById('carrito-total');
    var countEl = document.getElementById('carrito-count');

    function abrir() {
      panel.classList.add('carrito-panel--open');
      overlay.classList.add('carrito-overlay--visible');
      document.body.style.overflow = 'hidden';
    }

    function cerrar() {
      panel.classList.remove('carrito-panel--open');
      overlay.classList.remove('carrito-overlay--visible');
      document.body.style.overflow = '';
    }

    function agregar(id) {
      id = String(id);
      estado[id] = (estado[id] || 0) + 1;
      renderizar();
      abrir();
    }

    function cambiarCantidad(id, delta) {
      id = String(id);
      estado[id] = Math.max(0, (estado[id] || 0) + delta);
      if (estado[id] === 0) delete estado[id];
      renderizar();
    }

    function calcularTotal() {
      var total = 0;
      Object.keys(estado).forEach(function(id) {
        total += CATALOGO[id].precio * estado[id];
      });
      return total;
    }

    function contarItems() {
      return Object.values(estado).reduce(function(a, b) { return a + b; }, 0);
    }

    function renderizar() {
      var ids = Object.keys(estado);
      var total = calcularTotal();
      var count = contarItems();

      // Badge en nav
      if (count > 0) {
        countEl.textContent = count;
        countEl.hidden = false;
      } else {
        countEl.hidden = true;
      }

      // Vacío vs items
      if (ids.length === 0) {
        vacio.style.display = '';
        footer.style.display = 'none';
        // Limpiar items
        var items = body.querySelectorAll('.carrito__item');
        items.forEach(function(el) { el.remove(); });
        return;
      }

      vacio.style.display = 'none';
      footer.style.display = '';
      totalEl.textContent = '$' + total.toLocaleString('es-MX');

      // Reconstruir lista de items
      var itemsExistentes = body.querySelectorAll('.carrito__item');
      itemsExistentes.forEach(function(el) { el.remove(); });

      ids.forEach(function(id) {
        var prod = CATALOGO[id];
        var cant = estado[id];
        var subtotal = prod.precio * cant;

        var div = document.createElement('div');
        div.className = 'carrito__item';
        div.dataset.id = id;
        div.innerHTML =
          '<img class="carrito__item-img" src="' + prod.img + '" alt="' + prod.nombre + '">' +
          '<div class="carrito__item-info">' +
            '<p class="carrito__item-nom">' + prod.nombre + '</p>' +
            '<p class="carrito__item-prec">$' + prod.precio.toLocaleString('es-MX') + ' c/u &nbsp;·&nbsp; $' + subtotal.toLocaleString('es-MX') + '</p>' +
          '</div>' +
          '<div class="carrito__item-ctrl">' +
            '<button class="carrito__qty-btn" data-action="menos" data-id="' + id + '">&#8722;</button>' +
            '<span class="carrito__qty">' + cant + '</span>' +
            '<button class="carrito__qty-btn" data-action="mas" data-id="' + id + '">&#43;</button>' +
            '<button class="carrito__item-del" data-action="del" data-id="' + id + '" aria-label="Eliminar">&#x2715;</button>' +
          '</div>';
        body.appendChild(div);
      });
    }

    function generarMensaje() {
      var ids = Object.keys(estado);
      if (ids.length === 0) return '';

      var lineas = ids.map(function(id) {
        var p = CATALOGO[id];
        var c = estado[id];
        return '• ' + p.nombre + ' ×' + c + ' — $' + (p.precio * c).toLocaleString('es-MX');
      });

      var total = calcularTotal();
      var wa = (typeof TEXTO !== 'undefined' && TEXTO.carrito_whatsapp)
        ? TEXTO.carrito_whatsapp
        : '5217773460478';

      var msg =
        '¡Hola! Me gustaría hacer el siguiente pedido a *PHN Cosmetics*:\n\n' +
        '🛒 *Mi pedido:*\n' +
        lineas.join('\n') + '\n\n' +
        '💰 *Total: $' + total.toLocaleString('es-MX') + '*\n\n' +
        '¿Me pueden confirmar disponibilidad y forma de pago? ¡Gracias! 😊';

      return 'https://wa.me/' + wa + '?text=' + encodeURIComponent(msg);
    }

    // Eventos
    document.getElementById('carrito-abrir').addEventListener('click', abrir);
    document.getElementById('carrito-cerrar').addEventListener('click', cerrar);
    overlay.addEventListener('click', cerrar);

    document.getElementById('carrito-pedir').addEventListener('click', function() {
      var url = generarMensaje();
      if (url) window.open(url, '_blank');
    });

    // Delegación de eventos dentro del panel
    body.addEventListener('click', function(e) {
      var btn = e.target.closest('[data-action]');
      if (!btn) return;
      var id = btn.dataset.id;
      var action = btn.dataset.action;
      if (action === 'mas')   cambiarCantidad(id, +1);
      if (action === 'menos') cambiarCantidad(id, -1);
      if (action === 'del')   { delete estado[id]; renderizar(); }
    });

    // Botones "Agregar al carrito" en secciones de producto y rutinas
    document.addEventListener('click', function(e) {
      var btn = e.target.closest('[data-id].boton--agregar, [data-id].tarjeta__carrito');
      if (!btn) return;
      agregar(btn.dataset.id);
    });

    // Render inicial
    renderizar();
  })();
  </script>
