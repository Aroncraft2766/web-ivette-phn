<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meredith — Asistente Ale-Natura</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Widget raíz ── */
    #phn-widget {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 99999;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    }

    /* ── Ventana de chat ── */
    #phn-chat {
      width: 370px;
      height: 540px;
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.18), 0 4px 16px rgba(0,0,0,0.08);
      display: none;
      flex-direction: column;
      overflow: hidden;
      transform-origin: bottom right;
      border: 1px solid rgba(0,0,0,0.06);
    }
    #phn-chat.open {
      display: flex;
      animation: phn-open 0.3s cubic-bezier(0.34,1.4,0.64,1) forwards;
    }
    @keyframes phn-open {
      from { opacity: 0; transform: scale(0.85) translateY(16px); }
      to   { opacity: 1; transform: scale(1)    translateY(0);    }
    }

    /* ── Header ── */
    #phn-header {
      background: linear-gradient(135deg, #569123 0%, #70B62F 60%, #88cc44 100%);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    #phn-header-left { display: flex; align-items: center; gap: 12px; }
    #phn-hdr-avatar {
      width: 46px; height: 46px;
      background: transparent;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
      border: 2px solid rgba(255,255,255,0.6);
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    #phn-hdr-name  { font-size: 1em; font-weight: 700; color: #fff; letter-spacing: 0.01em; }
    #phn-hdr-sub   { font-size: 0.72em; color: rgba(255,255,255,0.75); margin-top: 1px; letter-spacing: 0.02em; text-transform: uppercase; }
    #phn-hdr-status {
      font-size: 0.74em; color: rgba(255,255,255,0.88); margin-top: 3px;
      display: flex; align-items: center; gap: 5px;
    }
    #phn-hdr-status::before {
      content: ''; width: 7px; height: 7px;
      background: #5dff8a; border-radius: 50%; display: inline-block;
      box-shadow: 0 0 6px rgba(93,255,138,0.6);
    }
    #phn-hdr-close {
      background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.95); font-size: 1em; cursor: pointer;
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%; transition: background 0.2s, transform 0.15s; flex-shrink: 0;
    }
    #phn-hdr-close:hover { background: rgba(255,255,255,0.28); transform: scale(1.08); }

    /* ── Área de mensajes ── */
    #phn-messages {
      flex: 1; overflow-y: auto;
      padding: 18px 14px;
      display: flex; flex-direction: column; gap: 10px;
      scroll-behavior: smooth;
      background: #f7f9fc;
    }
    #phn-messages::-webkit-scrollbar { width: 4px; }
    #phn-messages::-webkit-scrollbar-track { background: transparent; }
    #phn-messages::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 4px; }

    /* ── Burbujas de mensaje ── */
    .phn-msg {
      max-width: 80%; padding: 10px 14px; border-radius: 16px;
      font-size: 0.875em; line-height: 1.6; word-break: break-word;
      animation: phn-fade-in 0.22s ease;
    }
    @keyframes phn-fade-in {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .phn-msg.bot {
      background: #ffffff; border-bottom-left-radius: 4px;
      align-self: flex-start;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08), 0 0 0 1px rgba(0,0,0,0.04);
      color: #1f2937;
    }
    .phn-msg.user {
      background: linear-gradient(135deg, #70B62F, #569123);
      border-bottom-right-radius: 4px;
      align-self: flex-end;
      box-shadow: 0 2px 8px rgba(112,182,47,0.3);
      color: #fff;
    }
    .phn-msg a { color: #70B62F; font-weight: 500; word-break: break-all; }
    .phn-msg.user a { color: #a8f0c8; }

    /* ── Indicador "escribiendo…" ── */
    #phn-typing {
      align-self: flex-start;
      background: #fff; border-radius: 16px; border-bottom-left-radius: 4px;
      padding: 12px 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08), 0 0 0 1px rgba(0,0,0,0.04);
      display: none;
    }
    #phn-typing.show { display: block; }
    .phn-dots { display: flex; gap: 5px; align-items: center; }
    .phn-dot { width: 8px; height: 8px; background: #b0b8c4; border-radius: 50%; animation: phn-bounce 1.3s infinite ease-in-out; }
    .phn-dot:nth-child(2) { animation-delay: 0.18s; }
    .phn-dot:nth-child(3) { animation-delay: 0.36s; }
    @keyframes phn-bounce {
      0%, 60%, 100% { transform: translateY(0);   opacity: 0.5; }
      30%            { transform: translateY(-7px); opacity: 1;   }
    }

    /* ── Chips de sugerencias rápidas ── */
    #phn-chips {
      padding: 8px 14px 6px;
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; flex-shrink: 0;
      background: #fff;
      border-top: 1px solid rgba(0,0,0,0.06);
    }
    .phn-chip {
      background: #f5fae8; border: 1.5px solid #70B62F; color: #569123;
      border-radius: 20px; padding: 5px 8px; font-size: 0.75em; font-weight: 600;
      cursor: pointer; transition: all 0.18s; white-space: nowrap; font-family: inherit;
      letter-spacing: 0.01em; text-align: center; overflow: hidden; text-overflow: ellipsis;
    }
    .phn-chip:hover { background: #70B62F; color: #fff; border-color: #70B62F; }

    /* ── Botón WhatsApp ── */
    #phn-wa-bar {
      background:#fff; padding:6px 14px 0; flex-shrink:0;
      border-top: 1px solid rgba(0,0,0,0.07);
    }
    #phn-wa-btn {
      width:100%; padding:9px 16px;
      background:#25d366; color:#fff; border:none; border-radius:10px;
      font-size:0.82em; font-weight:700; cursor:pointer;
      display:flex; align-items:center; justify-content:center; gap:8px;
      font-family:inherit; transition:background .2s;
    }
    #phn-wa-btn:hover { background:#128c7e; }
    html.dark #phn-wa-bar { background:#0d120d; border-top-color:rgba(255,255,255,0.07); }

    /* ── Área de entrada ── */
    #phn-input-area {
      background: #fff; padding: 12px 14px;
      display: flex; gap: 10px; align-items: center;
      flex-shrink: 0;
    }
    #phn-input {
      flex: 1; border: 1.5px solid #e5e9ef; outline: none;
      font-size: 0.88em; background: #f7f9fc; border-radius: 24px;
      padding: 10px 16px; font-family: inherit; color: #1f2937;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    #phn-input:focus { border-color: #70B62F; box-shadow: 0 0 0 3px rgba(112,182,47,0.15); background: #fff; }
    #phn-input::placeholder { color: #b0b8c4; }
    #phn-send {
      width: 42px; height: 42px;
      background: linear-gradient(135deg, #70B62F, #569123);
      border: none; border-radius: 50%; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 3px 10px rgba(112,182,47,0.35);
    }
    #phn-send:hover  { transform: scale(1.08); box-shadow: 0 4px 14px rgba(112,182,47,0.45); }
    #phn-send:active { transform: scale(0.95); }
    #phn-send:disabled { opacity: 0.7; cursor: default; transform: none; }

    /* ── Badge robot sobre el botón flotante ── */
    #phn-bot-badge {
      width: 34px; height: 34px;
      background: #fff; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 19px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.18);
      cursor: pointer;
      animation: phn-wiggle 4s ease-in-out infinite;
    }
    @keyframes phn-wiggle {
      0%, 85%, 100% { transform: rotate(0deg); }
      88%           { transform: rotate(-10deg); }
      92%           { transform: rotate(10deg); }
      96%           { transform: rotate(-6deg); }
    }

    /* ── Botón flotante principal ── */
    #phn-toggle {
      width: 62px; height: 62px;
      background: linear-gradient(135deg, #70B62F, #569123);
      border: none; border-radius: 50%; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 18px rgba(112,182,47,0.5);
      transition: transform 0.2s, box-shadow 0.2s;
      position: relative;
    }
    #phn-toggle:hover { transform: scale(1.07); box-shadow: 0 6px 24px rgba(112,182,47,0.6); }
    #phn-toggle:active { transform: scale(0.96); }

    .phn-ico {
      position: absolute;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.25s ease, transform 0.25s ease;
    }
    .phn-ico-wa    { opacity: 1;  transform: scale(1) rotate(0deg); }
    .phn-ico-close { opacity: 0;  transform: scale(0.6) rotate(-90deg); color: #fff; font-size: 1.5em; font-weight: 300; }
    #phn-toggle.open .phn-ico-wa    { opacity: 0;  transform: scale(0.6) rotate(90deg); }
    #phn-toggle.open .phn-ico-close { opacity: 1;  transform: scale(1) rotate(0deg); }

    /* ── Punto de notificación ── */
    #phn-notif {
      position: absolute; top: 0; right: 0;
      width: 18px; height: 18px;
      background: #ff3b30; border-radius: 50%;
      border: 2px solid #fff; font-size: 0.65em; font-weight: 700; color: #fff;
      display: flex; align-items: center; justify-content: center;
      animation: phn-pulse-dot 2s infinite;
    }
    #phn-notif.hidden { display: none; }
    @keyframes phn-pulse-dot {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.2); }
    }

    /* ── Responsive móvil ── */
    @media (max-width: 768px) {
      #phn-widget    { bottom: 14px; right: 6px; }
      #phn-bot-badge { display: none; }
      #phn-chat      { width: calc(100vw - 20px); height: min(520px, 78vh); }
    }

    /* ── Modo oscuro ── */
    html.dark #phn-chat         { background: #1a1f1a; border-color: rgba(255,255,255,0.06); box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 4px 16px rgba(0,0,0,0.3); }
    html.dark #phn-messages     { background: #111611; }
    html.dark #phn-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); }
    html.dark .phn-msg.bot      { background: #1e2a1e; color: #e2e8e2; box-shadow: 0 1px 4px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.05); }
    html.dark .phn-msg a        { color: #7dd44a; }
    html.dark #phn-typing       { background: #1e2a1e; box-shadow: 0 1px 4px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.05); }
    html.dark .phn-dot          { background: #4a5a4a; }
    html.dark #phn-chips        { background: #161c16; border-top-color: rgba(255,255,255,0.07); }
    html.dark .phn-chip         { background: #1a2e0a; border-color: #3d6e18; color: #8fd44a; }
    html.dark .phn-chip:hover   { background: #70B62F; color: #fff; border-color: #70B62F; }
    html.dark #phn-input-area   { background: #161c16; border-top-color: rgba(255,255,255,0.07); }
    html.dark #phn-input        { background: #1e2a1e; border-color: #2d3d2d; color: #e2e8e2; }

    html.dark #phn-input::placeholder { color: #4a5a4a; }
    html.dark #phn-bot-badge    { background: #1e2a1e; box-shadow: 0 3px 10px rgba(0,0,0,0.4); }
    html.dark #phn-notif        { border-color: #1a1f1a; }
  </style>
</head>

  /* ── Añadir mensaje a la UI ── */
  function addMsg(text, role) {
    const div = document.createElement('div');
    div.className = 'phn-msg ' + role;
    div.innerHTML = text
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>')
      .replace(/\n/g, '<br>');
    msgsEl.insertBefore(div, typingEl);
    scrollBottom();
  }

  function scrollBottom() {
    msgsEl.scrollTop = msgsEl.scrollHeight;
  }

  function showTyping()  { typingEl.classList.add('show');    scrollBottom(); }
  function hideTyping()  { typingEl.classList.remove('show'); }

  function strip(s) {
    return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  }
  function detectFAQ(msg) {
    const m = strip(msg);

  async function callAPI(userMsg) {
    const messages = [
      { role: 'system', content: SYSTEM_PROMPT },
      ...history,
      { role: 'user', content: userMsg },
    ];
    const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Authorization':  'Bearer ' + OPENROUTER_API_KEY,
        'Content-Type':   'application/json',
        'HTTP-Referer':   window.location.href,
        'X-Title':        'Meredith PHN Bot',
      },
      body: JSON.stringify({
        model:       'openai/gpt-4o-mini',
        messages,
        max_tokens:  400,
        temperature: 0.72,
      }),
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    return data.choices[0].message.content.trim();
  }

  /* ── Enviar mensaje ── */
  async function send(text) {
    text = text.trim();
    if (!text || busy) return;

    inputEl.value = '';
    addMsg(text, 'user');

    /* FAQ instantánea */
    const faq = detectFAQ(text);
    if (faq) {
      await pause(350);
      addMsg(faq, 'bot');
      return;
    }

    /* Llamada a la API */
    busy = true;
    showTyping();

    try {
      history.push({ role: 'user', content: text });
      const reply = await callAPI(text);
      history.push({ role: 'assistant', content: reply });
      hideTyping();
      addMsg(reply, 'bot');
    } catch (err) {
      history.pop();
      hideTyping();
      addMsg('😅 Ups, tuve un problema de conexión. Intenta de nuevo o contáctanos por WhatsApp: 5536194099 💚', 'bot');
    } finally {
      busy = false;
      inputEl.focus();
    }
  }
